{% extends 'base.html' %}
{% load i18n %}
{% block title %}{% trans "Delete Mission" %}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow border-danger">
            <div class="card-body p-4 text-center">
                <i class="bi bi-exclamation-triangle-fill text-danger fs-1 mb-3"></i>
                <h4>{% trans "Delete this mission?" %}</h4>
                <p class="text-muted">{{ mission.title }}</p>
                <p class="small text-danger">{% trans "This action is irreversible." %}</p>
                <form method="post" class="d-flex gap-2 justify-content-center">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">{% trans "Delete" %}</button>
                    <a href="{% url 'mission_detail' mission.pk %}" class="btn btn-outline-secondary">{% trans "Cancel" %}</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
