{% extends 'base.html' %}
{% load i18n %}
{% block title %}{% trans "Close Mission" %}{% endblock %}
{% block content %}
<div class="row justify-content-center" style="min-height:80vh;">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-body p-4 text-center">
                <i class="bi bi-check-circle-fill text-success fs-1 mb-3"></i>
                <h4>{% trans "Close this mission?" %}</h4>
                <p class="text-muted">{{ mission.title }}</p>
                <form method="post" class="d-flex gap-2 justify-content-center">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-success">{% trans "Confirm" %}</button>
                    <a href="{% url 'mission_detail' mission.pk %}" class="btn btn-outline-secondary">{% trans "Cancel" %}</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
