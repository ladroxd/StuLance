{% extends 'base.html' %}
{% block title %}Laisser un avis — StuLance{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-body p-4">
                <h4 class="mb-1"><i class="bi bi-star text-warning"></i> Laisser un avis</h4>
                <p class="text-muted mb-4">Mission : <strong>{{ mission.title }}</strong></p>
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label">{{ field.label }}</label>
                        {{ field }}
                        {% for error in field.errors %}<div class="text-danger small">{{ error }}</div>{% endfor %}
                    </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-warning">Envoyer l'avis</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
