{% extends 'base.html' %}
{% block title %}Connexion — StuLance{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4">
                    <i class="bi bi-box-arrow-in-right text-primary"></i> Connexion
                </h3>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Nom d'utilisateur</label>
                        <input type="text" name="username" class="form-control" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Mot de passe</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Se connecter</button>
                </form>
                <hr>
                <p class="text-center mb-0">Pas encore de compte ?
                    <a href="{% url 'register_student' %}">Etudiant</a> |
                    <a href="{% url 'register_client' %}">Client</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
